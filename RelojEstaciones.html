<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reloj Estacional Infinito</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            /* Transición ultra suave para el cambio de color */
            transition: background-color 1s linear; 
            color: white;
            text-align: center;
            overflow: hidden;
        }

        h1 {
            font-weight: 900;
            font-size: 6rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: -3px;
            /* Sombra sutil para legibilidad en fondos claros (como el amarillo) */
            filter: drop-shadow(0px 4px 6px rgba(0, 0, 0, 0.3));
        }

        .progress-container {
            width: 350px;
            height: 14px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 7px;
            overflow: hidden;
            margin-bottom: 25px;
            box-shadow: 0px 2px 4px rgba(0,0,0,0.1);
        }

        .progress-bar {
            height: 100%;
            background: white;
            width: 0%;
            transition: width 1s ease-in-out;
        }

        p {
            font-size: 1.5rem;
            font-weight: 400;
            margin: 5px 0;
            filter: drop-shadow(0px 2px 3px rgba(0, 0, 0, 0.2));
        }

        #fecha-completa {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1 id="estacion-nombre">VERANO</h1>
    
    <div class="progress-container">
        <div id="barra-progreso" class="progress-bar"></div>
    </div>
    
    <p id="porcentaje-texto">0%</p>
    <p id="fecha-completa"></p>

    <script>
        function obtenerColorEstacional(fecha) {
            // Calculamos el progreso del año total (0 a 1)
            const inicioAño = new Date(fecha.getFullYear(), 0, 1);
            const finAño = new Date(fecha.getFullYear() + 1, 0, 1);
            const progresoAño = (fecha - inicioAño) / (finAño - inicioAño);

            // Definimos los Hues (tonos) en el círculo cromático:
            // Rojo (Verano): 0 | Amarillo (Otoño): 50 | Celeste (Invierno): 190 | Verde (Primavera): 120
            
            // Para que el rojo sea a mitad de verano (febrero), el amarillo a mitad de otoño (mayo), etc.
            // Ajustamos el desfase para que coincida con el ritmo de la Tierra
            let hue;
            
            if (progresoAño < 0.25) { // Verano a Otoño
                hue = 0 + (50 - 0) * (progresoAño / 0.25);
            } else if (progresoAño < 0.50) { // Otoño a Invierno
                hue = 50 + (190 - 50) * ((progresoAño - 0.25) / 0.25);
            } else if (progresoAño < 0.75) { // Invierno a Primavera
                hue = 190 + (120 - 190) * ((progresoAño - 0.50) / 0.25);
            } else { // Primavera a Verano
                hue = 120 + (360 - 120) * ((progresoAño - 0.75) / 0.25);
            }

            return `hsl(${hue}, 75%, 45%)`;
        }

        function actualizarReloj() {
            const ahora = new Date();
            const año = ahora.getFullYear();
            
            const estaciones = [
                { nombre: "Verano", inicio: new Date(año - 1, 11, 21), fin: new Date(año, 2, 20), proxima: "Otoño" },
                { nombre: "Otoño", inicio: new Date(año, 2, 21), fin: new Date(año, 5, 20), proxima: "Invierno" },
                { nombre: "Invierno", inicio: new Date(año, 5, 21), fin: new Date(año, 8, 20), proxima: "Primavera" },
                { nombre: "Primavera", inicio: new Date(año, 8, 21), fin: new Date(año, 11, 20), proxima: "Verano" }
            ];

            let index = estaciones.findIndex(e => ahora >= e.inicio && ahora <= e.fin);
            if (index === -1) index = 0; 
            const actual = estaciones[index];

            const porcentaje = Math.floor(((ahora - actual.inicio) / (actual.fin - actual.inicio)) * 100);

            // Actualizar Color de fondo dinámicamente cada segundo
            document.body.style.backgroundColor = obtenerColorEstacional(ahora);
            
            // Actualizar Textos
            document.getElementById('estacion-nombre').innerText = actual.nombre;
            document.getElementById('barra-progreso').style.width = porcentaje + "%";
            document.getElementById('porcentaje-texto').innerText = `${porcentaje}% del ${actual.nombre}`;

            const diasFaltantes = Math.ceil((actual.fin - ahora) / (1000 * 60 * 60 * 24));
            const opciones = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            let fechaTexto = ahora.toLocaleDateString('es-ES', opciones);
            fechaTexto = fechaTexto.charAt(0).toUpperCase() + fechaTexto.slice(1);
            
            document.getElementById('fecha-completa').innerText = `${fechaTexto}, faltan ${diasFaltantes} días para el ${actual.proxima}`;
        }

        setInterval(actualizarReloj, 1000);
        actualizarReloj();
    </script>
</body>
</html>
