<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reloj Estacional</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            transition: background-color 0.2s linear; 
            color: white;
            text-align: center;
            overflow: hidden;
        }

        h1 {
            font-weight: 900;
            font-size: 6rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: -3px;
            filter: drop-shadow(0px 4px 8px rgba(0, 0, 0, 0.5));
        }

        .progress-container {
            width: 350px;
            height: 14px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 7px;
            overflow: hidden;
            margin-bottom: 25px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
        }

        .progress-bar {
            height: 100%;
            background: white;
            width: 0%;
            transition: width 0.3s ease-in-out;
            box-shadow: inset 0px 0px 5px rgba(255,255,255,0.5);
        }

        p {
            font-size: 1.5rem;
            font-weight: 400;
            margin: 5px 0;
            filter: drop-shadow(0px 2px 4px rgba(0, 0, 0, 0.4));
        }

        #fecha-completa {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-top: 10px;
        }

        /* Slider Minimalista Oculto */
        #time-slider {
            display: none;
            position: absolute;
            bottom: 50px;
            width: 80%;
            max-width: 400px;
            -webkit-appearance: none;
            background: transparent;
            outline: none;
        }

        #time-slider::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
        }

        #time-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            margin-top: -7px;
            box-shadow: 0 0 6px rgba(0,0,0,0.4);
            transition: transform 0.1s;
        }

        #time-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }
    </style>
</head>
<body>

    <h1 id="estacion-nombre">VERANO</h1>
    <div class="progress-container"><div id="barra-progreso" class="progress-bar"></div></div>
    <p id="porcentaje-texto">0%</p>
    <p id="fecha-completa"></p>

    <input type="range" id="time-slider" min="1" max="365" value="1">

    <script>
        let isTimeTravelMode = false;
        const timeSlider = document.getElementById('time-slider');

        function obtenerDiaDelAño(fecha) {
            const inicio = new Date(fecha.getFullYear(), 0, 0);
            const diferencia = fecha - inicio;
            const unDia = 1000 * 60 * 60 * 24;
            return Math.floor(diferencia / unDia);
        }

        document.addEventListener('keydown', (e) => {
            if (e.shiftKey && e.key.toLowerCase() === 't') {
                isTimeTravelMode = !isTimeTravelMode;
                if (isTimeTravelMode) {
                    timeSlider.style.display = 'block';
                    timeSlider.value = obtenerDiaDelAño(new Date());
                    actualizarReloj();
                } else {
                    timeSlider.style.display = 'none';
                    actualizarReloj();
                }
            }
        });

        function mezclarRGB(rgb1, rgb2, factor) {
            const r = Math.round(rgb1[0] + (rgb2[0] - rgb1[0]) * factor);
            const g = Math.round(rgb1[1] + (rgb2[1] - rgb1[1]) * factor);
            const b = Math.round(rgb1[2] + (rgb2[2] - rgb1[2]) * factor);
            return `rgb(${r}, ${g}, ${b})`;
        }

        function actualizarReloj() {
            let ahora = new Date();
            const añoActual = ahora.getFullYear();

            if (isTimeTravelMode) {
                const diaDelAño = parseInt(timeSlider.value);
                ahora = new Date(añoActual, 0, diaDelAño);
            }

            // HITOS CORREGIDOS: Exactamente los días 21 de cambio de estación
            const hitos = [
                { fecha: new Date(añoActual, 2, 21), rgb: [255, 128, 0] },      // OTOÑO (21 Mar)
                { fecha: new Date(añoActual, 5, 21), rgb: [23, 230, 230] },     // INVIERNO (21 Jun)
                { fecha: new Date(añoActual, 8, 21), rgb: [41, 204, 68] },      // PRIMAVERA (21 Sep)
                { fecha: new Date(añoActual, 11, 21), rgb: [230, 23, 23] }      // VERANO (21 Dic)
            ];

            let hitoPrev, hitoSig;
            if (ahora < hitos[0].fecha) {
                // Si es antes del 21 de marzo, venimos del Verano pasado
                hitoPrev = { fecha: new Date(añoActual - 1, 11, 21), rgb: [230, 23, 23] };
                hitoSig = hitos[0];
            } else if (ahora < hitos[1].fecha) {
                hitoPrev = hitos[0];
                hitoSig = hitos[1];
            } else if (ahora < hitos[2].fecha) {
                hitoPrev = hitos[1];
                hitoSig = hitos[2];
            } else if (ahora < hitos[3].fecha) {
                hitoPrev = hitos[2];
                hitoSig = hitos[3];
            } else {
                // Si es después del 21 de diciembre, vamos hacia el Otoño que viene
                hitoPrev = hitos[3];
                hitoSig = { fecha: new Date(añoActual + 1, 2, 21), rgb: [255, 128, 0] };
            }

            const factor = (ahora - hitoPrev.fecha) / (hitoSig.fecha - hitoPrev.fecha);
            const colorDinamico = mezclarRGB(hitoPrev.rgb, hitoSig.rgb, factor);

            const estaciones = [
                { nombre: "Verano", inicio: new Date(añoActual - 1, 11, 21), fin: new Date(añoActual, 2, 20), prox: "Otoño" },
                { nombre: "Otoño", inicio: new Date(añoActual, 2, 21), fin: new Date(añoActual, 5, 20), prox: "Invierno" },
                { nombre: "Invierno", inicio: new Date(añoActual, 5, 21), fin: new Date(añoActual, 8, 20), prox: "Primavera" },
                { nombre: "Primavera", inicio: new Date(añoActual, 8, 21), fin: new Date(añoActual, 11, 20), prox: "Verano" }
            ];

            let estActual = estaciones.find(e => ahora >= e.inicio && ahora <= e.fin);
            if (!estActual) {
                if (ahora.getMonth() === 11 && ahora.getDate() > 20) {
                    estActual = { nombre: "Verano", inicio: new Date(añoActual, 11, 21), fin: new Date(añoActual + 1, 2, 20), prox: "Otoño" };
                } else {
                    estActual = estaciones[0];
                }
            }

            const porc = Math.floor(((ahora - estActual.inicio) / (estActual.fin - estActual.inicio)) * 100);
            
            document.body.style.backgroundColor = colorDinamico;
            document.getElementById('estacion-nombre').innerText = estActual.nombre;
            document.getElementById('barra-progreso').style.width = Math.max(0, Math.min(100, porc)) + "%";
            document.getElementById('porcentaje-texto').innerText = `${porc}% del ${estActual.nombre}`;

            const dias = Math.ceil((estActual.fin - ahora) / (1000 * 60 * 60 * 24));
            const opciones = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            let fechaTexto = ahora
