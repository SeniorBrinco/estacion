<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reloj Estacional - Sintonía Fina</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            transition: background-color 1s linear; 
            color: white;
            text-align: center;
            overflow: hidden;
        }

        h1 {
            font-weight: 900;
            font-size: 6rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: -3px;
            filter: drop-shadow(0px 4px 8px rgba(0, 0, 0, 0.5));
        }

        .progress-container {
            width: 350px;
            height: 14px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 7px;
            overflow: hidden;
            margin-bottom: 25px;
        }

        .progress-bar {
            height: 100%;
            background: white;
            width: 0%;
            transition: width 1s ease-in-out;
        }

        p {
            font-size: 1.5rem;
            font-weight: 400;
            margin: 5px 0;
            filter: drop-shadow(0px 2px 4px rgba(0, 0, 0, 0.4));
        }

        #fecha-completa {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1 id="estacion-nombre">VERANO</h1>
    <div class="progress-container"><div id="barra-progreso" class="progress-bar"></div></div>
    <p id="porcentaje-texto">0%</p>
    <p id="fecha-completa"></p>

    <script>
        function actualizarReloj() {
            const ahora = new Date();
            const año = ahora.getFullYear();
            
            // Hitos de color puro (Mitad de cada estación)
            const hitos = [
                { fecha: new Date(año, 1, 4), hue: 0 },       // ROJO (4 Feb)
                { fecha: new Date(año, 4, 5), hue: 50 },      // AMARILLO (5 May)
                { fecha: new Date(año, 7, 5), hue: 190 },     // CELESTE (5 Ago)
                { fecha: new Date(año, 10, 5), hue: 120 }     // VERDE (5 Nov)
            ];

            let hitoPrev, hitoSig;

            if (ahora < hitos[0].fecha) {
                // Estamos entre el Verde del año pasado y el Rojo de ahora
                hitoPrev = { fecha: new Date(año - 1, 10, 5), hue: 120 };
                hitoSig = hitos[0];
            } else if (ahora < hitos[1].fecha) {
                hitoPrev = hitos[0];
                hitoSig = hitos[1];
            } else if (ahora < hitos[2].fecha) {
                hitoPrev = hitos[1];
                hitoSig = hitos[2];
            } else if (ahora < hitos[3].fecha) {
                hitoPrev = hitos[2];
                hitoSig = hitos[3];
            } else {
                hitoPrev = hitos[3];
                hitoSig = { fecha: new Date(año + 1, 1, 4), hue: 360 };
            }

            const factor = (ahora - hitoPrev.fecha) / (hitoSig.fecha - hitoPrev.fecha);
            const hueDinamico = hitoPrev.hue + (hitoSig.hue - hitoPrev.hue) * factor;

            // Datos de la estación astronómica
            const estaciones = [
                { nombre: "Verano", inicio: new Date(año - 1, 11, 21), fin: new Date(año, 2, 20), prox: "Otoño" },
                { nombre: "Otoño", inicio: new Date(año, 2, 21), fin: new Date(año, 5, 20), prox: "Invierno" },
                { nombre: "Invierno", inicio: new Date(año, 5, 21), fin: new Date(año, 8, 20), prox: "Primavera" },
                { nombre: "Primavera", inicio: new Date(año, 8, 21), fin: new Date(año, 11, 20), prox: "Verano" }
            ];

            let estActual = estaciones.find(e => ahora >= e.inicio && ahora <= e.fin) || estaciones[0];
            const porc = Math.floor(((ahora - estActual.inicio) / (estActual.fin - estActual.inicio)) * 100);

            document.body.style.backgroundColor = `hsl(${hueDinamico}, 70%, 40%)`;
            document.getElementById('estacion-nombre').innerText = estActual.nombre;
            document.getElementById('barra-progreso').style.width = porc + "%";
            document.getElementById('porcentaje-texto').innerText = `${porc}% del ${estActual.nombre}`;

            const dias = Math.ceil((estActual.fin - ahora) / (1000 * 60 * 60 * 24));
            const opciones = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            let fechaTexto = ahora.toLocaleDateString('es-ES', opciones);
            document.getElementById('fecha-completa').innerText = `${fechaTexto.charAt(0).toUpperCase() + fechaTexto.slice(1)}, faltan ${dias} días para el ${estActual.prox}`;
        }

        setInterval(actualizarReloj, 1000);
        actualizarReloj();
    </script>
</body>
</html>
