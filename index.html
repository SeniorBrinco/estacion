<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reloj Estacional</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            transition: background-color 0.2s linear; 
            color: white;
            text-align: center;
            overflow: hidden;
        }

        h1 {
            font-weight: 900;
            font-size: 6rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: -3px;
            filter: drop-shadow(0px 4px 8px rgba(0, 0, 0, 0.5));
        }

        .progress-container {
            width: 350px;
            height: 14px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 7px;
            overflow: hidden;
            margin-bottom: 25px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
        }

        .progress-bar {
            height: 100%;
            background: white;
            width: 0%;
            transition: width 0.3s ease-in-out;
            box-shadow: inset 0px 0px 5px rgba(255,255,255,0.5);
        }

        p {
            font-size: 1.5rem;
            font-weight: 400;
            margin: 5px 0;
            filter: drop-shadow(0px 2px 4px rgba(0, 0, 0, 0.4));
        }

        #fecha-completa {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-top: 10px;
        }

        /* Estilos para el slider oculto */
        #time-travel-container {
            display: none;
            position: absolute;
            bottom: 40px;
            width: 80%;
            max-width: 600px;
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        input[type=range] {
            width: 100%;
            cursor: pointer;
        }

        .label-travel {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: block;
        }
    </style>
</head>
<body>

    <h1 id="estacion-nombre">VERANO</h1>
    <div class="progress-container"><div id="barra-progreso" class="progress-bar"></div></div>
    <p id="porcentaje-texto">0%</p>
    <p id="fecha-completa"></p>

    <div id="time-travel-container">
        <span class="label-travel">Modo Viaje en el Tiempo (Shift + T para cerrar)</span>
        <input type="range" id="time-slider" min="1" max="365" value="1">
    </div>

    <script>
        let isTimeTravelMode = false;
        const sliderContainer = document.getElementById('time-travel-container');
        const timeSlider = document.getElementById('time-slider');

        // Escuchar combinación Shift + T
        document.addEventListener('keydown', (e) => {
            if (e.shiftKey && e.key.toLowerCase() === 't') {
                isTimeTravelMode = !isTimeTravelMode;
                sliderContainer.style.display = isTimeTravelMode ? 'block' : 'none';
                if (!isTimeTravelMode) actualizarReloj(); // Volver al tiempo real
            }
        });

        function actualizarReloj() {
            let ahora = new Date();
            const añoActual = ahora.getFullYear();

            // Si estamos en modo viaje, calculamos la fecha basada en el slider
            if (isTimeTravelMode) {
                const diaDelAño = parseInt(timeSlider.value);
                ahora = new Date(añoActual, 0, diaDelAño);
            }

            // --- LÓGICA DE COLORES ---
            const hitos = [
                { fecha: new Date(añoActual, 1, 4), hue: 0 },       // ROJO
                { fecha: new Date(añoActual, 4, 5), hue: 50 },      // AMARILLO
                { fecha: new Date(añoActual, 7, 5), hue: 190 },     // CELESTE
                { fecha: new Date(añoActual, 10, 5), hue: 120 }     // VERDE
            ];

            let hitoPrev, hitoSig;
            if (ahora < hitos[0].fecha) {
                hitoPrev = { fecha: new Date(añoActual - 1, 10, 5), hue: 120 };
                hitoSig = hitos[0];
            } else if (ahora < hitos[1].fecha) {
                hitoPrev = hitos[0];
                hitoSig = hitos[1];
            } else if (ahora < hitos[2].fecha) {
                hitoPrev = hitos[1];
                hitoSig = hitos[2];
            } else if (ahora < hitos[3].fecha) {
                hitoPrev = hitos[2];
                hitoSig = hitos[3];
            } else {
                hitoPrev = hitos[3];
                hitoSig = { fecha: new Date(añoActual + 1, 1, 4), hue: 360 };
            }

            const factor = (ahora - hitoPrev.fecha) / (hitoSig.fecha - hitoPrev.fecha);
            const hueDinamico = hitoPrev.hue + (hitoSig.hue - hitoPrev.hue) * factor;

            // --- LÓGICA DE ESTACIONES ---
            const estaciones = [
                { nombre: "Verano", inicio: new Date(añoActual - 1, 11, 21), fin: new Date(añoActual, 2, 20), prox: "Otoño" },
                { nombre: "Otoño", inicio: new Date(añoActual, 2, 21), fin: new Date(añoActual, 5, 20), prox: "Invierno" },
                { nombre: "Invierno", inicio: new Date(añoActual, 5, 21), fin: new Date(añoActual, 8, 20), prox: "Primavera" },
                { nombre: "Primavera", inicio: new Date(añoActual, 8, 21), fin: new Date(añoActual, 11, 20), prox: "Verano" }
            ];

            // Re-ajuste de estaciones para el slider si cruza año
            let estActual = estaciones.find(e => ahora >= e.inicio && ahora <= e.fin);
            if (!estActual) {
                // Si es finales de diciembre (después del 20), es Verano
                if (ahora.getMonth() === 11 && ahora.getDate() > 20) {
                    estActual = { nombre: "Verano", inicio: new Date(añoActual, 11, 21), fin: new Date(añoActual + 1, 2, 20), prox: "Otoño" };
                } else {
                    estActual = estaciones[0];
                }
            }

            const porc = Math.floor(((ahora - estActual.inicio) / (estActual.fin - estActual.inicio)) * 100);
            const diasFaltantes = Math.ceil((estActual.fin - ahora) / (1000 * 60 * 60 * 24));

            // --- ACTUALIZACIÓN DE INTERFAZ ---
            document.body.style.backgroundColor = `hsl(${hueDinamico}, 70%, 40%)`;
            document.getElementById('estacion-nombre').innerText = estActual.nombre;
            document.getElementById('barra-progreso').style.width = Math.max(0, Math.min(100, porc)) + "%";
            document.getElementById('porcentaje-texto').innerText = `${porc}% del ${estActual.nombre}`;

            const opciones = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            let fechaTexto = ahora.toLocaleDateString('es-ES', opciones).replace(',', '');
            fechaTexto = fechaTexto.charAt(0).toUpperCase() + fechaTexto.slice(1);
            
            document.getElementById('fecha-completa').innerText = `${fechaTexto}, faltan ${diasFaltantes} días para el ${estActual.prox}`;
        }

        // Listener para que el slider actualice todo en tiempo real
        timeSlider.addEventListener('input', actualizarReloj);

        // Intervalo normal
        setInterval(() => {
            if (!isTimeTravelMode) actualizarReloj();
        }, 1000);

        actualizarReloj();
    </script>
</body>
</html>
